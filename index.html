<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DIESEL® | Gestão de Comunicação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="loginScreen" class="full-viewport-center">
        <div class="login-box">
            <div class="brand-header">
                <h1>EURO DIESEL<span>®</span></h1>
                <p>Mecatrônica de Precisão</p>
            </div>
            
            <div class="form-group">
                <div class="input-wrapper">
                    <label>Identificação</label>
                    <input type="text" id="userNameInput" placeholder="Digite seu nome..." autocomplete="off" oninput="toggleAdminFields(this.value)">
                </div>
                
                <div id="adminArea" class="input-wrapper" style="display: none;">
                    <label>Senha do Proprietário</label>
                    <input type="password" id="adminPassField" placeholder="••••••••">
                </div>

                <div id="colabArea" class="input-wrapper">
                    <label>Código de Convite</label>
                    <input type="text" id="accessCodeInput" placeholder="EURO-XXXXX">
                </div>
                
                <button onclick="handleLogin()" class="btn-main">
                    ACESSAR SISTEMA <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </section>

    <main class="app-container" id="appMain" style="display: none;">
        <aside class="sidebar">
            <div class="sidebar-top">
                <header class="sidebar-header">
                    <div class="user-profile">
                        <div class="avatar-circle">L</div>
                        <div class="user-status">
                            <strong>Leandro®</strong>
                            <div class="online-now"><span class="status-dot pulse"></span> Online</div>
                        </div>
                        <button onclick="ChatApp.removerCredenciais()" class="btn-lock"><i class="fas fa-user-shield"></i></button>
                    </div>
                </header>

                <div class="search-box">
                    <div class="search-inner">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Pesquisar...">
                    </div>
                </div>
            </div>

            <nav class="contact-list" id="contactList"></nav>

            <footer class="admin-panel" id="adminPanel" style="display: none;">
                <button onclick="gerarConviteWhatsApp()" class="btn-invite">
                    <i class="fab fa-whatsapp"></i> CONVIDAR
                </button>
            </footer>
        </aside>

        <section class="chat-area">
            <div id="welcomeScreen" class="full-viewport-center">
                <div class="welcome-content">
                    <i class="fas fa-shield-halved fa-4x"></i>
                    <h2>Rede Interna EURO DIESEL®</h2>
                    <p>Selecione um colaborador para iniciar.</p>
                </div>
            </div>

            <div id="mainChat" class="chat-layout" style="display: none;">
                <header class="chat-header">
                    <div class="chat-info">
                        <h4 id="currentChatName">Nome</h4>
                        <small id="currentChatStatus"></small>
                    </div>
                </header>
                
                <div class="messages-container" id="msgBox"></div>

                <div class="input-bar">
                    <input type="text" id="msgInput" placeholder="Escreva sua mensagem...">
                    <button onclick="enviarMensagem()" class="btn-send">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
